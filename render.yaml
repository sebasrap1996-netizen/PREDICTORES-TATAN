services:
  - type: web
    name: tatan-aviator-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PORT
        value: "10000"
    plan: free
