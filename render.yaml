services:
  - type: web
    name: tatan-aviator-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PORT
        value: "10000"
      - key: BOOKMAKERS_JSON
        value: ""   # Solo para backup — con el disco persistente ya no es necesario
    disk:
      name: tatan-data
      mountPath: /data
      sizeGB: 1
    plan: free
